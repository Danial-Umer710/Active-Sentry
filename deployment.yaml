apiVersion: apps/v1
kind: Deployment
metadata:
  name: active-sentry-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: active-sentry
  template:
    metadata:
      labels:
        app: active-sentry
    spec:
      containers:
      - name: active-sentry
        image: daniboy7/active-sentry-app:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: active-sentry-service
spec:
  type: NodePort
  selector:
    app: active-sentry
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30080
